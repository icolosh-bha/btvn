kind = "web"
previewPath = "/"
title = "ShopNow"
version = "1.0.0"
id = "artifacts/shopping-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21393

[services.development]
run = "pnpm --filter @workspace/shopping-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shopping-site", "run", "build" ]
publicDir = "artifacts/shopping-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21393"
BASE_PATH = "/"
